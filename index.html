<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JIT MARKETING | 짓마케팅</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
        theme: { extend: {
            fontFamily: { sans: ['Pretendard Variable','Pretendard','-apple-system','sans-serif'] },
            animation: {
                'float':'float 6s ease-in-out infinite',
                'glow-pulse':'glowPulse 3s ease-in-out infinite',
            },
            keyframes: {
                float:{'0%,100%':{transform:'translateY(0px)'},'50%':{transform:'translateY(-12px)'}},
                glowPulse:{'0%,100%':{opacity:'0.4'},'50%':{opacity:'0.9'}},
            }
        }}
    }
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
    <script src="https://code.iconify.design/iconify-icon/1.0.8/iconify-icon.min.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body{font-family:'Pretendard Variable',Pretendard,-apple-system,sans-serif;}
        .keep-all{word-break:keep-all;word-wrap:break-word;}
        html{scroll-behavior:smooth;}
        ::selection{background:#FF5C1A;color:white;}
        .bezel-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);box-shadow:0 0 0 1px rgba(255,255,255,0.04),inset 0 1px 0 rgba(255,255,255,0.08);border-radius:20px;transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);}
        .bezel-card:hover{border-color:rgba(255,92,26,0.3);box-shadow:0 0 0 1px rgba(255,92,26,0.08),inset 0 1px 0 rgba(255,255,255,0.1),0 20px 60px -10px rgba(255,92,26,0.2);transform:translateY(-4px);}
        .bezel-light{background:#fff;border:1px solid rgba(0,0,0,0.06);box-shadow:0 0 0 1px rgba(0,0,0,0.03),0 4px 20px rgba(0,0,0,0.06);border-radius:20px;transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);}
        .bezel-light:hover{border-color:rgba(255,92,26,0.2);box-shadow:0 20px 60px -10px rgba(255,92,26,0.12);transform:translateY(-4px);}
        .glass-nav{background:rgba(10,10,15,0.82);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border:1px solid rgba(255,255,255,0.08);box-shadow:0 8px 32px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.06);}
        .gradient-text{background:linear-gradient(135deg,#FF5C1A 0%,#E8282A 100%);-webkit-background-clip:text;background-clip:text;color:transparent;}
        .btn-spring{transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.3s ease;}
        .btn-spring:hover{transform:translateY(-3px) scale(1.02);}
        .btn-spring:active{transform:translateY(0) scale(0.98);}
        .reveal{opacity:0;transform:translateY(28px);transition:opacity 0.6s ease,transform 0.6s cubic-bezier(0.34,1.56,0.64,1);}
        .reveal.visible{opacity:1;transform:translateY(0);}
        .stag1{transition-delay:80ms;} .stag2{transition-delay:160ms;} .stag3{transition-delay:240ms;} .stag4{transition-delay:320ms;} .stag5{transition-delay:400ms;} .stag6{transition-delay:480ms;} .stag7{transition-delay:560ms;} .stag8{transition-delay:640ms;}
        .hero0{opacity:0;animation:slideUp 0.6s cubic-bezier(0.34,1.56,0.64,1) 0ms forwards;}
        .hero1{opacity:0;animation:slideUp 0.6s cubic-bezier(0.34,1.56,0.64,1) 120ms forwards;}
        .hero2{opacity:0;animation:slideUp 0.6s cubic-bezier(0.34,1.56,0.64,1) 240ms forwards;}
        .hero3{opacity:0;animation:slideUp 0.6s cubic-bezier(0.34,1.56,0.64,1) 360ms forwards;}
        .hero4{opacity:0;animation:slideUp 0.6s cubic-bezier(0.34,1.56,0.64,1) 480ms forwards;}
        @keyframes slideUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
        .svc-tag{font-size:0.62rem;font-weight:700;letter-spacing:0.08em;padding:2px 9px;border-radius:999px;text-transform:uppercase;}
        .dot-grid{background-image:radial-gradient(rgba(255,255,255,0.06) 1px,transparent 1px);background-size:28px 28px;}
    </style>
</head>
<body class="bg-[#0A0A0F] text-slate-800 overflow-x-hidden">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const LOGO = "https://i.ibb.co/xS7vHBCg/ZIT-MARKETING-LOGO.png";

const Tag=({type})=>{
    const map={BEST:['bg-orange-500/15 text-orange-400 border-orange-500/25','BEST'],NEW:['bg-emerald-500/15 text-emerald-400 border-emerald-500/25','NEW'],HOT:['bg-red-500/15 text-red-400 border-red-500/25','HOT']};
    if(!map[type])return null;
    const[cls,label]=map[type];
    return <span className={`svc-tag border ${cls}`}>{label}</span>;
};

const ServiceCard=({icon,title,subtitle,items,highlight,tags=[]})=>(
    <div className={`bezel-card p-6 flex flex-col h-full ${highlight?'bg-[#1a1108]':'bg-[#111118]'}`}>
        <div className="flex justify-between items-start mb-5">
            <div className={`w-12 h-12 rounded-xl flex items-center justify-center flex-shrink-0 ${highlight?'bg-orange-500/20 border border-orange-500/30':'bg-white/5 border border-white/10'}`}>
                <iconify-icon icon={icon} width="24" style={{color:highlight?'#FF5C1A':'#94a3b8'}}></iconify-icon>
            </div>
            <div className="flex gap-1.5 flex-wrap justify-end">{tags.map(t=><Tag key={t} type={t}/>)}</div>
        </div>
        <h3 className="text-white text-lg font-bold mb-1 keep-all">{title}</h3>
        {subtitle&&<p className="text-slate-500 text-xs font-bold uppercase tracking-wide mb-4">{subtitle}</p>}
        <ul className="space-y-2.5 mt-auto pt-4 border-t border-white/[0.06]">
            {items.map((item,i)=>(
                <li key={i} className="flex items-start gap-2.5">
                    <iconify-icon icon="solar:check-circle-bold" width="15" style={{color:'#FF5C1A',flexShrink:0,marginTop:'2px'}}></iconify-icon>
                    <span className={`text-sm keep-all ${i===0&&highlight?'text-orange-300 font-semibold':'text-slate-400'}`}>{item}</span>
                </li>
            ))}
        </ul>
    </div>
);

const ContactItem=({iconName,title,desc,link})=>(
    <div className="flex items-center gap-4 group">
        <div className="w-12 h-12 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center group-hover:bg-orange-500/15 group-hover:border-orange-500/25 transition-all flex-shrink-0">
            <iconify-icon icon={iconName} width="20" style={{color:'#FF5C1A'}}></iconify-icon>
        </div>
        <div>
            <p className="text-xs text-slate-500 font-bold uppercase tracking-widest mb-0.5">{title}</p>
            {link?<a href={link} target="_blank" rel="noreferrer" className="text-base font-bold text-white hover:text-orange-400 transition-colors">{desc}</a>
                 :<p className="text-base font-bold text-white keep-all">{desc}</p>}
        </div>
    </div>
);

const App=()=>{
    const[isMenuOpen,setIsMenuOpen]=useState(false);
    const[scrolled,setScrolled]=useState(false);
    const[activeSection,setActiveSection]=useState('');
    const[selSvc,setSelSvc]=useState([]);
    const toggleSvc=s=>setSelSvc(p=>p.includes(s)?p.filter(x=>x!==s):[...p,s]);

    useEffect(()=>{
        const obs=new IntersectionObserver(entries=>entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible');}),{threshold:0.1});
        document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
        return()=>obs.disconnect();
    },[]);

    useEffect(()=>{
        const ids=['about','features','services','portfolio','process','contact'];
        const onScroll=()=>{
            setScrolled(window.scrollY>20);
            let found='';
            ids.forEach(id=>{const el=document.getElementById(id);if(el&&window.scrollY>=el.offsetTop-120)found=id;});
            setActiveSection(found);
        };
        window.addEventListener('scroll',onScroll,{passive:true});
        return()=>window.removeEventListener('scroll',onScroll);
    },[]);

    const go=id=>{
        const el=document.getElementById(id);
        if(el)window.scrollTo({top:el.getBoundingClientRect().top+window.pageYOffset-80,behavior:'smooth'});
        setIsMenuOpen(false);
    };

    const navItems=[{l:'소개',id:'about'},{l:'차별점',id:'features'},{l:'서비스',id:'services'},{l:'파트너',id:'portfolio'},{l:'프로세스',id:'process'}];

    /* NAV */
    const Nav=(
        <nav className={`fixed w-full z-50 transition-all duration-300 ${scrolled?'py-2':'py-4'}`}>
            <div className="container mx-auto px-4 md:px-6 max-w-7xl">
                <div className="glass-nav rounded-full px-5 py-3 flex justify-between items-center">
                    <div className="flex items-center gap-2.5 cursor-pointer" onClick={()=>window.scrollTo({top:0,behavior:'smooth'})}>
                        <img src={LOGO} alt="JIT" className="h-8 w-auto object-contain" onError={e=>e.target.style.display='none'}/>
                        <span className="text-white font-black text-lg tracking-tight hidden sm:block">JIT <span className="gradient-text">MARKETING</span></span>
                    </div>
                    <div className="hidden md:flex gap-7 text-sm font-semibold text-slate-400">
                        {navItems.map(({l,id})=>(
                            <button key={id} onClick={()=>go(id)} className="relative py-2 hover:text-white transition-colors">
                                {l}
                                <span className={`absolute bottom-0 left-1/2 -translate-x-1/2 w-1.5 h-1.5 rounded-full bg-orange-500 transition-all duration-300 ${activeSection===id?'opacity-100 scale-100':'opacity-0 scale-0'}`}/>
                            </button>
                        ))}
                    </div>
                    <button onClick={()=>go('contact')} className="hidden md:flex items-center gap-2 bg-gradient-to-r from-[#FF5C1A] to-[#E8282A] text-white px-5 py-2.5 rounded-full font-bold text-sm btn-spring shadow-lg shadow-orange-900/30">
                        문의하기 <iconify-icon icon="solar:arrow-right-bold" width="14"></iconify-icon>
                    </button>
                    <button className="md:hidden text-white p-2" onClick={()=>setIsMenuOpen(!isMenuOpen)}>
                        {isMenuOpen
                            ?<iconify-icon icon="solar:close-circle-linear" width="24"></iconify-icon>
                            :<iconify-icon icon="solar:hamburger-menu-linear" width="24"></iconify-icon>}
                    </button>
                </div>
            </div>
            {isMenuOpen&&(
                <div className="absolute top-full left-0 w-full px-4 mt-2">
                    <div className="bg-[#111118] border border-white/10 shadow-2xl rounded-2xl p-2 flex flex-col gap-1 backdrop-blur-xl">
                        {[...navItems,{l:'문의하기',id:'contact'}].map(({l,id})=>(
                            <button key={id} onClick={()=>go(id)} className={`text-left text-base font-bold py-4 px-4 rounded-xl transition-colors border-b border-white/5 last:border-0 ${activeSection===id?'text-orange-400 bg-orange-500/10':'text-slate-300 hover:bg-white/5 hover:text-white'}`}>{l}</button>
                        ))}
                    </div>
                </div>
            )}
        </nav>
    );

    /* HERO */
    const Hero=(
        <section className="relative min-h-screen flex items-center pt-24 pb-20 overflow-hidden bg-[#0A0A0F] dot-grid">
            <div className="absolute top-[-10%] left-[-5%] w-[500px] h-[500px] bg-orange-600/15 rounded-full blur-[100px] animate-float pointer-events-none"></div>
            <div className="absolute bottom-[-10%] right-[-5%] w-[400px] h-[400px] bg-purple-600/10 rounded-full blur-[100px] pointer-events-none"></div>
            <div className="container mx-auto px-6 relative z-10 max-w-6xl">
                <div className="max-w-3xl">
                    <div className="hero0 inline-flex items-center gap-2 px-4 py-2 rounded-full bg-white/5 border border-white/10 text-orange-400 font-bold text-xs md:text-sm mb-8">
                        <iconify-icon icon="solar:stars-bold" width="16" style={{color:'#FF5C1A'}}></iconify-icon>
                        진주 · 경남 No.1 매출 성장 파트너
                    </div>
                    <h1 className="font-black text-white leading-[1.05] tracking-[-0.03em] mb-6">
                        <div className="hero1 text-5xl md:text-7xl lg:text-[88px] keep-all">광고는 노출이 아니라</div>
                        <div className="hero2 text-5xl md:text-7xl lg:text-[88px] gradient-text keep-all">매출입니다.</div>
                    </h1>
                    <p className="hero3 text-slate-400 text-base md:text-xl max-w-2xl mb-10 leading-relaxed keep-all">
                        보여주기식 광고에 돈 낭비하지 마세요.<br className="hidden md:block"/>
                        <strong className="text-white font-semibold">사장님의 마음</strong>으로 매출 구조를 직접 설계합니다.
                    </p>
                    <div className="hero4 flex flex-col sm:flex-row gap-4 mb-16">
                        <button onClick={()=>go('contact')} className="btn-spring flex items-center justify-center gap-2 px-8 py-4 bg-gradient-to-r from-[#FF5C1A] to-[#E8282A] text-white rounded-2xl font-bold text-lg shadow-[0_0_30px_-5px_rgba(255,92,26,0.5)]">
                            무료 상담 신청하기 <iconify-icon icon="solar:arrow-right-bold" width="18"></iconify-icon>
                        </button>
                        <button onClick={()=>go('portfolio')} className="btn-spring flex items-center justify-center gap-2 px-8 py-4 bg-white/5 text-white border border-white/10 rounded-2xl font-bold text-lg hover:bg-white/10 transition-colors">
                            성공 사례 보기
                        </button>
                    </div>
                    <div className="hero4 grid grid-cols-3 gap-3 max-w-sm">
                        {[{n:'8년+',l:'현장 경험'},{n:'11+',l:'파트너 매장'},{n:'진주·경남',l:'전문 지역'}].map((s,i)=>(
                            <div key={i} className="bezel-card text-center py-4 px-2">
                                <div className="text-white font-black text-xl mb-1">{s.n}</div>
                                <div className="text-slate-500 text-xs font-semibold">{s.l}</div>
                            </div>
                        ))}
                    </div>
                </div>
            </div>
        </section>
    );

    const About=(
        <section id="about" className="py-20 md:py-28 bg-white relative overflow-hidden">
            <div className="absolute inset-0 bg-[radial-gradient(ellipse_at_top_right,rgba(255,92,26,0.04)_0%,transparent_60%)] pointer-events-none"></div>
            <div className="container mx-auto px-6 relative z-10 max-w-6xl">
                <div className="flex flex-col lg:flex-row gap-12 lg:gap-20 items-center">
                    <div className="w-full lg:w-5/12 reveal max-w-md mx-auto lg:max-w-none">
                        <div className="p-2.5 rounded-[28px] border border-slate-100 shadow-[0_20px_60px_-10px_rgba(0,0,0,0.12)] bg-white">
                            <div className="p-2 rounded-[22px] bg-slate-50 border border-slate-200/60">
                                <div className="aspect-square bg-[#0A0A0F] rounded-2xl overflow-hidden flex items-center justify-center p-10">
                                    <img src={LOGO} alt="JIT Marketing" className="w-full h-full object-contain filter drop-shadow-[0_0_20px_rgba(255,92,26,0.4)]" onError={e=>e.target.style.display='none'}/>
                                </div>
                            </div>
                            <div className="mt-2.5 mx-1 mb-1 bg-white border border-slate-100 p-4 rounded-xl shadow-sm text-center">
                                <h3 className="text-lg font-bold text-slate-900">서효승 대표</h3>
                                <p className="text-sm text-slate-500 font-medium">현장 경험 8년차 실전 마케터</p>
                            </div>
                        </div>
                    </div>
                    <div className="w-full lg:w-7/12 reveal text-center lg:text-left">
                        <div className="inline-flex items-center gap-2 text-orange-600 font-bold tracking-widest text-xs uppercase mb-4 bg-orange-50 px-4 py-2 rounded-full">
                            <iconify-icon icon="solar:user-id-bold" width="14" style={{color:'#FF5C1A'}}></iconify-icon>
                            About CEO
                        </div>
                        <h2 className="text-3xl md:text-5xl font-black text-slate-900 mb-6 leading-tight keep-all">
                            매장 운영을 이해하는<br/>
                            <span className="relative inline-block mt-1">
                                <span className="relative z-10 gradient-text">실전형 마케터</span>
                                <span className="absolute bottom-1 left-0 w-full h-3 bg-orange-100 -z-10 rounded"></span>
                            </span>
                        </h2>
                        <p className="text-slate-600 text-base md:text-lg leading-relaxed mb-8 keep-all">
                            안녕하세요, 짓마케팅 대표 서효승입니다.<br/><br/>
                            저는 책상에만 앉아있는 마케터가 아닙니다. 직접 매장을 운영해 본 사장이었고, 주방과 홀을 뛰어다닌 실무자였습니다.<br/><br/>
                            사장님이 진짜 원하는 것은 예쁜 사진이 아니라, <strong className="text-slate-900">통장에 찍히는 '매출'</strong>이라는 것을 누구보다 잘 알고 있습니다.
                        </p>
                        <div className="relative pl-6 border-l-2 border-slate-200 space-y-4 text-left">
                            {[
                                {year:'2025',title:'짓마케팅 대표',hi:true},
                                {year:'2024',title:'궁중수라간(한스톤) 실장'},
                                {year:'2023',title:'연해주 마케팅 담당 실장'},
                                {year:'2022',title:'서경방송 팀에스 마케팅 실장'},
                                {year:'2017',title:'화양연화 대표 (직접 운영)'},
                            ].map((item,i)=>(
                                <div key={i} className="relative flex items-center gap-4">
                                    <div className={`absolute -left-[25px] w-3 h-3 rounded-full border-2 ${item.hi?'bg-orange-500 border-orange-500 shadow-[0_0_8px_rgba(255,92,26,0.5)]':'bg-white border-slate-300'}`}></div>
                                    <span className={`text-xs font-bold w-10 flex-shrink-0 ${item.hi?'text-orange-500':'text-slate-400'}`}>{item.year}</span>
                                    <span className={`text-sm font-semibold keep-all ${item.hi?'text-slate-900':'text-slate-600'}`}>{item.title}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            </div>
        </section>
    );

    const Features=(
        <section id="features" className="py-20 md:py-28 bg-[#0A0A0F] relative overflow-hidden">
            <div className="absolute top-0 right-0 w-[400px] h-[400px] bg-blue-600/08 rounded-full blur-[100px] pointer-events-none"></div>
            <div className="container mx-auto px-6 max-w-6xl">
                <div className="text-center mb-14 reveal">
                    <div className="inline-flex items-center gap-2 text-orange-400 font-bold tracking-widest text-xs uppercase mb-4 bg-orange-500/10 px-4 py-2 rounded-full border border-orange-500/20">
                        <iconify-icon icon="solar:star-bold" width="14" style={{color:'#FF5C1A'}}></iconify-icon>
                        차별점
                    </div>
                    <h2 className="text-3xl md:text-5xl font-black text-white mb-4 keep-all">왜 짓마케팅인가요?</h2>
                    <p className="text-slate-400 text-base md:text-lg max-w-2xl mx-auto keep-all">다른 대행사와는 다릅니다. 사장님의 고민을 해결하는 4가지 핵심 차별점</p>
                </div>
                <div className="grid md:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-5">
                    {[
                        {icon:'solar:users-group-rounded-bold-duotone',title:'현장형 마케팅',desc:'사장 경험이 있는 대표가 직접 기획하고 실무자로 뜁니다.',color:'#3B82F6',num:'01'},
                        {icon:'solar:target-bold-duotone',title:'이벤트 설계 능력',desc:'서경방송 마케팅 실장 경험으로 확실한 이벤트 기획력을 보유했습니다.',color:'#FF5C1A',num:'02'},
                        {icon:'solar:chart-2-bold-duotone',title:'주간 보고 시스템',desc:'매주 성과 정리. 실행→피드백→재설계 구조로 투명하게 보고합니다.',color:'#10B981',num:'03'},
                        {icon:'solar:bill-list-bold-duotone',title:'합리적 수수료',desc:'고정 운영비 방식. 과도한 광고비 유도 없이 꼭 필요한 것만 제안합니다.',color:'#8B5CF6',num:'04'},
                    ].map((c,i)=>(
                        <div key={i} className={`reveal bezel-card p-7 bg-[#111118] group cursor-default stag${i+1}`}>
                            <div className="text-4xl font-black text-right mb-4 text-white/[0.06]">{c.num}</div>
                            <div className="w-14 h-14 rounded-2xl flex items-center justify-center mb-5" style={{background:`${c.color}18`,border:`1px solid ${c.color}30`}}>
                                <iconify-icon icon={c.icon} width="28" style={{color:c.color}}></iconify-icon>
                            </div>
                            <h3 className="text-white text-xl font-bold mb-2 keep-all">{c.title}</h3>
                            <p className="text-slate-400 text-sm leading-relaxed keep-all">{c.desc}</p>
                            <div className="mt-5 h-px w-0 group-hover:w-full transition-all duration-500 rounded-full" style={{background:`linear-gradient(to right,${c.color},transparent)`}}></div>
                        </div>
                    ))}
                </div>
            </div>
        </section>
